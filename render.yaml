services:
  - type: web
    name: ai-resume-analyzer
    runtime: docker
    dockerfilePath: deployment/Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: APP_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: resume_analyzer
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    plan: free
